<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MD Viewer</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📝</text></svg>">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,opsz,wght@0,8..60,200..900;1,8..60,200..900&family=Fira+Code:wght@300..700&family=Lora:ital,wght@0,400..700;1,400..700&display=swap">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/styles/github.min.css" id="hljs-light" disabled>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/styles/github-dark.min.css" id="hljs-dark">
  <style>
    :root {
      --bg: #ffffff;
      --bg-secondary: #f6f8fa;
      --text: #1f2328;
      --text-secondary: #656d76;
      --border: #d0d7de;
      --link: #0969da;
      --code-bg: #f6f8fa;
      --blockquote-border: #d0d7de;
      --blockquote-text: #656d76;
      --table-border: #d0d7de;
      --table-row-alt: #f6f8fa;
      --drop-zone-bg: #f6f8fa;
      --drop-zone-border: #d0d7de;
      --drop-zone-hover: #ddf4ff;
      --shadow: rgba(31, 35, 40, 0.04);
      --hr: hsla(210, 18%, 87%, 1);
    }

    [data-theme="dark"] {
      --bg: #0d1117;
      --bg-secondary: #161b22;
      --text: #e6edf3;
      --text-secondary: #8b949e;
      --border: #30363d;
      --link: #58a6ff;
      --code-bg: #161b22;
      --blockquote-border: #30363d;
      --blockquote-text: #8b949e;
      --table-border: #30363d;
      --table-row-alt: #161b22;
      --drop-zone-bg: #161b22;
      --drop-zone-border: #30363d;
      --drop-zone-hover: #1c3049;
      --shadow: rgba(0, 0, 0, 0.2);
      --hr: #30363d;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: "Lora", Georgia, "Times New Roman", serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
      transition: background 0.2s, color 0.2s;
    }

    /* ---- Header ---- */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 24px;
      border-bottom: 1px solid var(--border);
      background: var(--bg);
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 12px;
      font-weight: 600;
      font-size: 15px;
      min-width: 0;
    }

    .header-left .app-name {
      white-space: nowrap;
    }

    .file-info {
      display: none;
      align-items: center;
      gap: 8px;
      min-width: 0;
    }

    .file-info.visible {
      display: flex;
    }

    .file-info .separator {
      color: var(--text-secondary);
    }

    .file-info .filename {
      color: var(--text-secondary);
      font-weight: 400;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .file-info .change-file {
      color: var(--link);
      cursor: pointer;
      font-weight: 400;
      font-size: 13px;
      white-space: nowrap;
      background: none;
      border: none;
      font-family: inherit;
    }

    .file-info .change-file:hover {
      text-decoration: underline;
    }

    .theme-toggle {
      background: none;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 6px 10px;
      cursor: pointer;
      font-size: 16px;
      color: var(--text);
      line-height: 1;
      transition: background 0.15s;
      flex-shrink: 0;
    }

    .theme-toggle:hover {
      background: var(--bg-secondary);
    }

    /* ---- Drop Zone ---- */
    .drop-zone-container {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: calc(100vh - 49px);
      padding: 24px;
    }

    .drop-zone-container.collapsed {
      display: none;
    }

    .drop-zone {
      width: 100%;
      max-width: 540px;
      border: 2px dashed var(--drop-zone-border);
      border-radius: 12px;
      padding: 64px 32px;
      text-align: center;
      cursor: pointer;
      background: var(--drop-zone-bg);
      transition: background 0.15s, border-color 0.15s;
    }

    .drop-zone:hover,
    .drop-zone.drag-over {
      background: var(--drop-zone-hover);
      border-color: var(--link);
    }

    .drop-zone-icon {
      font-size: 48px;
      margin-bottom: 16px;
    }

    .drop-zone-text {
      font-size: 16px;
      color: var(--text);
      margin-bottom: 4px;
    }

    .drop-zone-hint {
      font-size: 13px;
      color: var(--text-secondary);
    }

    /* ---- Content ---- */
    .content {
      display: none;
      max-width: 860px;
      margin: 0 auto;
      padding: 32px 24px 64px;
    }

    .content.visible {
      display: block;
    }

    /* ---- Markdown Styles ---- */
    .content h1,
    .content h2,
    .content h3,
    .content h4,
    .content h5,
    .content h6 {
      margin-top: 40px;
      margin-bottom: 16px;
      font-family: "Source Serif 4", Georgia, "Times New Roman", serif;
      font-weight: 600;
      line-height: 1.25;
    }

    .content h1 { font-size: 2.4em; padding-bottom: 0.3em; border-bottom: 1px solid var(--border); }
    .content h2 { font-size: 1.8em; padding-bottom: 0.3em; border-bottom: 1px solid var(--border); }
    .content h3 { font-size: 1.5em; }
    .content h4 { font-size: 1.2em; }
    .content h5 { font-size: 1em; }
    .content h6 { font-size: 0.95em; color: var(--text-secondary); }

    .content h1:first-child,
    .content > .collapsible-section:first-child > h1 { margin-top: 0; }
    .content > .frontmatter-card + .collapsible-section > h1 { margin-top: 0; }

    .content p {
      margin-bottom: 16px;
    }

    .content a {
      color: var(--link);
      text-decoration: none;
    }

    .content a:hover {
      text-decoration: underline;
    }

    .content img {
      max-width: 100%;
      height: auto;
      border-radius: 6px;
    }

    .content strong { font-weight: 600; }
    [data-theme="dark"] .content strong { color: #c0d3f6; }

    .content code {
      background: var(--code-bg);
      padding: 0.2em 0.4em;
      border-radius: 6px;
      font-size: 85%;
      font-family: "Fira Code", ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, "Liberation Mono", monospace;
    }

    .content pre {
      background: var(--code-bg);
      border-radius: 6px;
      padding: 16px;
      overflow-x: auto;
      margin-bottom: 16px;
      border: 1px solid var(--border);
    }

    .content pre code {
      background: none;
      padding: 0;
      border-radius: 0;
      font-size: 85%;
      line-height: 1.45;
    }

    .content blockquote {
      border-left: 4px solid var(--blockquote-border);
      padding: 0 16px;
      color: var(--blockquote-text);
      margin-bottom: 16px;
    }

    .content ul,
    .content ol {
      padding-left: 2em;
      margin-bottom: 16px;
    }

    .content li {
      margin-bottom: 4px;
    }

    .content li > ul,
    .content li > ol {
      margin-bottom: 0;
    }

    .content table {
      border-collapse: collapse;
      width: 100%;
      margin-bottom: 16px;
      overflow-x: auto;
      display: block;
    }

    .content th,
    .content td {
      border: 1px solid var(--table-border);
      padding: 6px 13px;
      text-align: left;
    }

    .content th {
      font-weight: 600;
      background: var(--bg-secondary);
    }

    .content tr:nth-child(even) {
      background: var(--table-row-alt);
    }

    .content hr {
      height: 2px;
      background: var(--hr);
      border: none;
      margin: 24px 0;
    }

    /* Task lists */
    .content .task-list-item {
      list-style-type: none;
      margin-left: -1.5em;
    }

    .content .task-list-item input[type="checkbox"] {
      margin-right: 0.5em;
      vertical-align: middle;
    }

    /* ---- Collapsible Sections ---- */
    .collapsible-section > h1,
    .collapsible-section > h2,
    .collapsible-section > h3,
    .collapsible-section > h4,
    .collapsible-section > h5,
    .collapsible-section > h6 {
      cursor: pointer;
      user-select: none;
      position: relative;
      padding-left: 1.2em;
    }

    .collapsible-section > h1::before,
    .collapsible-section > h2::before,
    .collapsible-section > h3::before,
    .collapsible-section > h4::before,
    .collapsible-section > h5::before,
    .collapsible-section > h6::before {
      content: "▾";
      position: absolute;
      left: 0;
      font-size: 0.6em;
      top: 50%;
      transform: translateY(-50%);
      transition: transform 0.2s ease;
      color: var(--text-secondary);
    }

    .collapsible-section.collapsed > h1::before,
    .collapsible-section.collapsed > h2::before,
    .collapsible-section.collapsed > h3::before,
    .collapsible-section.collapsed > h4::before,
    .collapsible-section.collapsed > h5::before,
    .collapsible-section.collapsed > h6::before {
      transform: translateY(-50%) rotate(-90deg);
    }

    .collapsible-section > .section-body {
      overflow: hidden;
      transition: max-height 0.25s ease, opacity 0.2s ease;
      opacity: 1;
    }

    .collapsible-section.collapsed > .section-body {
      max-height: 0 !important;
      opacity: 0;
      overflow: hidden;
    }

    /* ---- Layout with TOC sidebar ---- */
    .main-layout {
      display: flex;
      justify-content: center;
      max-width: 1140px; /* 260 sidebar + 880 content area */
      margin: 0 auto;
    }

    .toc-sidebar {
      display: none;
      position: sticky;
      top: 49px; /* header height */
      align-self: flex-start;
      width: 260px;
      min-width: 260px;
      max-height: calc(100vh - 49px);
      overflow-y: auto;
      padding: 20px 16px;
      border-right: 1px solid var(--border);
      font-size: 13px;
    }

    .toc-sidebar.visible {
      display: block;
    }

    .toc-sidebar ul {
      list-style: none;
      margin: 0;
      padding: 0;
    }

    .toc-sidebar li {
      margin: 0;
    }

    .toc-sidebar a {
      display: block;
      padding: 4px 8px;
      color: var(--text-secondary);
      text-decoration: none;
      border-radius: 4px;
      line-height: 1.4;
      transition: background 0.15s, color 0.15s;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .toc-sidebar a:hover {
      background: var(--bg-secondary);
      color: var(--text);
    }

    .toc-sidebar a.active {
      background: var(--bg-secondary);
      color: var(--link);
      font-weight: 600;
    }

    .toc-sidebar .toc-level-1 a { padding-left: 8px; }
    .toc-sidebar .toc-level-2 a { padding-left: 20px; }
    .toc-sidebar .toc-level-3 a { padding-left: 32px; }
    .toc-sidebar .toc-level-4 a { padding-left: 44px; }
    .toc-sidebar .toc-level-5 a { padding-left: 56px; }
    .toc-sidebar .toc-level-6 a { padding-left: 68px; }

    /* Content takes remaining space and stays centered */
    .main-layout .content {
      flex: 1;
      min-width: 0;
    }

    .main-layout.has-toc .content {
      margin-left: 0;
      margin-right: 0;
    }

    /* ---- Drag overlay ---- */
    .drag-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(9, 105, 218, 0.08);
      border: 3px dashed var(--link);
      border-radius: 12px;
      z-index: 100;
      pointer-events: none;
      margin: 8px;
    }

    .drag-overlay.visible {
      display: block;
    }

    /* ---- Paste hint ---- */
    .paste-hint {
      font-size: 13px;
      color: var(--text-secondary);
      margin-top: 12px;
    }

    /* ---- Frontmatter Metadata Card ---- */
    .frontmatter-card {
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--bg-secondary);
      padding: 20px 24px;
      margin-bottom: 24px;
    }

    .frontmatter-card .fm-title {
      font-size: 1.4em;
      font-weight: 600;
      margin-bottom: 12px;
      line-height: 1.3;
    }

    .frontmatter-card .fm-fields {
      display: flex;
      flex-wrap: wrap;
      gap: 8px 20px;
      margin-bottom: 4px;
    }

    .frontmatter-card .fm-field {
      font-size: 14px;
    }

    .frontmatter-card .fm-label {
      color: var(--text-secondary);
      font-weight: 500;
      margin-right: 4px;
    }

    .frontmatter-card .fm-label::after {
      content: ":";
    }

    .frontmatter-card .fm-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 8px;
      margin-bottom: 4px;
    }

    .frontmatter-card .fm-tag {
      display: inline-block;
      background: var(--link);
      color: #fff;
      font-size: 12px;
      font-weight: 500;
      padding: 2px 10px;
      border-radius: 12px;
      line-height: 1.6;
    }

    [data-theme="dark"] .frontmatter-card .fm-tag {
      background: rgba(88, 166, 255, 0.2);
      color: var(--link);
    }

    .frontmatter-card .fm-list-section {
      margin-top: 10px;
      font-size: 14px;
    }

    .frontmatter-card .fm-list-section .fm-label {
      display: block;
      margin-bottom: 4px;
    }

    .frontmatter-card .fm-list-section ul {
      padding-left: 1.5em;
      margin: 0;
    }

    .frontmatter-card .fm-list-section li {
      margin-bottom: 2px;
    }

    /* ---- Responsive ---- */
    @media (max-width: 768px) {
      .toc-sidebar {
        display: none !important;
      }
    }

    @media (max-width: 600px) {
      .header { padding: 10px 16px; }
      .content { padding: 20px 16px 48px; }
      .drop-zone { padding: 48px 20px; }
    }
  </style>
</head>
<body>

  <header class="header">
    <div class="header-left">
      <span class="app-name">MD Viewer</span>
      <div class="file-info" id="fileInfo">
        <span class="separator">/</span>
        <span class="filename" id="fileName"></span>
        <button class="change-file" id="changeFileBtn" type="button">change file</button>
      </div>
    </div>
    <button class="theme-toggle" id="themeToggle" type="button" aria-label="Switch to light mode">☀️</button>
  </header>

  <div class="drop-zone-container" id="dropZoneContainer">
    <div class="drop-zone" id="dropZone" role="button" tabindex="0" aria-label="Drop a markdown file or click to browse">
      <div class="drop-zone-icon">📄</div>
      <div class="drop-zone-text">Drop a <strong>.md</strong> file here or click to browse</div>
      <div class="drop-zone-hint">Accepts .md, .markdown, .txt</div>
      <div class="paste-hint">or paste markdown with Ctrl+V / Cmd+V</div>
    </div>
    <input type="file" id="fileInput" accept=".md,.markdown,.txt" hidden>
  </div>

  <div class="main-layout" id="mainLayout">
    <nav class="toc-sidebar" id="tocSidebar"></nav>
    <div class="content" id="content"></div>
  </div>

  <div class="drag-overlay" id="dragOverlay"></div>

  <script src="https://cdn.jsdelivr.net/npm/js-yaml@4/dist/js-yaml.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/markdown-it@14.1.1/dist/markdown-it.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/markdown-it-task-lists@2.1.1/dist/markdown-it-task-lists.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/highlight.min.js"></script>
  <script>
    (function () {
      // ---- Elements ----
      const dropZoneContainer = document.getElementById('dropZoneContainer');
      const dropZone = document.getElementById('dropZone');
      const fileInput = document.getElementById('fileInput');
      const contentEl = document.getElementById('content');
      const fileInfo = document.getElementById('fileInfo');
      const fileName = document.getElementById('fileName');
      const changeFileBtn = document.getElementById('changeFileBtn');
      const themeToggle = document.getElementById('themeToggle');
      const dragOverlay = document.getElementById('dragOverlay');
      const hljsLight = document.getElementById('hljs-light');
      const hljsDark = document.getElementById('hljs-dark');
      const tocSidebar = document.getElementById('tocSidebar');
      const mainLayout = document.getElementById('mainLayout');

      // ---- TOC smooth scroll (delegated, set up once) ----
      tocSidebar.addEventListener('click', function (e) {
        var link = e.target.closest('a[data-target]');
        if (!link) return;
        e.preventDefault();
        var target = document.getElementById(link.getAttribute('data-target'));
        if (target) {
          target.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }
      });

      // ---- Markdown-it setup ----
      const md = window.markdownit({
        html: true,
        linkify: true,
        typographer: true,
        highlight: function (str, lang) {
          if (lang && hljs.getLanguage(lang)) {
            try {
              return '<pre class="hljs"><code>' +
                hljs.highlight(str, { language: lang, ignoreIllegals: true }).value +
                '</code></pre>';
            } catch (_) { /* fall through */ }
          }
          return '<pre class="hljs"><code>' + md.utils.escapeHtml(str) + '</code></pre>';
        }
      }).use(window.markdownitTaskLists);

      let hasFile = false;

      // ---- Frontmatter helpers ----
      function parseFrontmatter(text) {
        if (!text.startsWith('---\n') && !text.startsWith('---\r\n')) return { meta: null, body: text };
        var end = text.indexOf('\n---', 3);
        if (end === -1) return { meta: null, body: text };
        var yamlStr = text.substring(4, end);
        var body = text.substring(end + 4).replace(/^\r?\n/, '');
        try {
          var meta = jsyaml.load(yamlStr);
          if (meta && typeof meta === 'object' && !Array.isArray(meta)) return { meta: meta, body: body };
        } catch (_) { /* invalid YAML, treat as regular content */ }
        return { meta: null, body: text };
      }

      function toTitleCase(str) {
        return str.replace(/[_-]/g, ' ').replace(/\b\w/g, function (c) { return c.toUpperCase(); });
      }

      function escapeHtml(str) {
        var div = document.createElement('div');
        div.textContent = str;
        return div.innerHTML;
      }

      function buildFrontmatterCard(meta) {
        var parts = [];
        var scalars = [];
        var tags = null;
        var lists = [];

        Object.keys(meta).forEach(function (key) {
          var val = meta[key];
          if (key === 'title') return; // handled separately
          if (key === 'tags' && Array.isArray(val)) {
            tags = val;
          } else if (Array.isArray(val)) {
            lists.push({ key: key, items: val });
          } else if (val !== null && val !== undefined && typeof val !== 'object') {
            scalars.push({ key: key, value: String(val) });
          }
        });

        parts.push('<div class="frontmatter-card">');
        if (meta.title) {
          parts.push('<div class="fm-title">' + escapeHtml(String(meta.title)) + '</div>');
        }
        if (scalars.length) {
          parts.push('<div class="fm-fields">');
          scalars.forEach(function (s) {
            parts.push('<span class="fm-field"><span class="fm-label">' + escapeHtml(toTitleCase(s.key)) + '</span>' + escapeHtml(s.value) + '</span>');
          });
          parts.push('</div>');
        }
        if (tags) {
          parts.push('<div class="fm-tags">');
          tags.forEach(function (t) {
            parts.push('<span class="fm-tag">' + escapeHtml(String(t)) + '</span>');
          });
          parts.push('</div>');
        }
        lists.forEach(function (l) {
          parts.push('<div class="fm-list-section">');
          parts.push('<span class="fm-label">' + escapeHtml(toTitleCase(l.key)) + '</span>');
          parts.push('<ul>');
          l.items.forEach(function (item) {
            parts.push('<li>' + escapeHtml(String(item)) + '</li>');
          });
          parts.push('</ul></div>');
        });
        parts.push('</div>');
        return parts.join('');
      }

      // ---- Collapsible sections ----
      function headingLevel(el) {
        var m = el.tagName && el.tagName.match(/^H([1-6])$/i);
        return m ? parseInt(m[1], 10) : 0;
      }

      function wrapSections(container) {
        // Collect all direct children into an array
        var nodes = Array.from(container.childNodes);
        var fragment = document.createDocumentFragment();
        var stack = []; // stack of { section, bodyEl, level }

        nodes.forEach(function (node) {
          var level = node.nodeType === 1 ? headingLevel(node) : 0;

          if (level > 0) {
            // Pop sections from stack that are same level or deeper
            while (stack.length > 0 && stack[stack.length - 1].level >= level) {
              stack.pop();
            }

            // Create a new collapsible section
            var section = document.createElement('div');
            section.className = 'collapsible-section';
            section.setAttribute('data-level', level);

            var bodyEl = document.createElement('div');
            bodyEl.className = 'section-body';

            section.appendChild(node);
            section.appendChild(bodyEl);

            // If there's a parent section, add to its body; otherwise add to fragment
            if (stack.length > 0) {
              stack[stack.length - 1].bodyEl.appendChild(section);
            } else {
              fragment.appendChild(section);
            }

            stack.push({ section: section, bodyEl: bodyEl, level: level });
          } else {
            // Non-heading content — add to current section body or to fragment
            if (stack.length > 0) {
              stack[stack.length - 1].bodyEl.appendChild(node);
            } else {
              fragment.appendChild(node);
            }
          }
        });

        container.innerHTML = '';
        container.appendChild(fragment);

        // Add click handlers for headings
        container.addEventListener('click', function (e) {
          var heading = e.target.closest('h1, h2, h3, h4, h5, h6');
          if (!heading) return;
          var section = heading.parentElement;
          if (!section || !section.classList.contains('collapsible-section')) return;
          // Don't toggle if clicking a link inside a heading
          if (e.target.tagName === 'A') return;
          section.classList.toggle('collapsed');
        });
      }

      // ---- TOC sidebar ----
      var tocObserver = null;

      function slugify(text) {
        return text.toLowerCase()
          .replace(/[^\w\s-]/g, '')
          .replace(/\s+/g, '-')
          .replace(/-+/g, '-')
          .replace(/^-|-$/g, '');
      }

      function buildTOC() {
        var headings = contentEl.querySelectorAll('h1, h2, h3, h4, h5, h6');
        if (headings.length === 0) {
          tocSidebar.classList.remove('visible');
          mainLayout.classList.remove('has-toc');
          return;
        }

        // Assign IDs to headings
        var usedIds = {};
        headings.forEach(function (h) {
          if (!h.id) {
            var base = slugify(h.textContent);
            var id = base || 'section';
            var counter = 1;
            while (usedIds[id]) {
              id = base + '-' + counter;
              counter++;
            }
            h.id = id;
            usedIds[id] = true;
          } else {
            usedIds[h.id] = true;
          }
        });

        // Build flat list of TOC items
        var html = '<ul>';
        headings.forEach(function (h) {
          var level = headingLevel(h);
          html += '<li class="toc-level-' + level + '">';
          html += '<a href="#' + h.id + '" data-target="' + h.id + '">';
          html += escapeHtml(h.textContent);
          html += '</a></li>';
        });
        html += '</ul>';

        tocSidebar.innerHTML = html;
        tocSidebar.classList.add('visible');
        mainLayout.classList.add('has-toc');

        // Scroll spy via IntersectionObserver
        if (tocObserver) {
          tocObserver.disconnect();
        }

        var tocLinks = tocSidebar.querySelectorAll('a[data-target]');
        var activeLink = null;

        tocObserver = new IntersectionObserver(function (entries) {
          entries.forEach(function (entry) {
            if (entry.isIntersecting) {
              if (activeLink) activeLink.classList.remove('active');
              var link = tocSidebar.querySelector('a[data-target="' + entry.target.id + '"]');
              if (link) {
                link.classList.add('active');
                activeLink = link;
              }
            }
          });
        }, {
          rootMargin: '0px 0px -70% 0px',
          threshold: 0
        });

        headings.forEach(function (h) {
          tocObserver.observe(h);
        });
      }

      // ---- Render ----
      function renderMarkdown(text, name) {
        var result = parseFrontmatter(text);
        var cardHtml = result.meta ? buildFrontmatterCard(result.meta) : '';
        contentEl.innerHTML = cardHtml + md.render(result.body);

        // Wrap sections for collapsible behavior (skip frontmatter card)
        // We need to wrap only the markdown-rendered content, not the frontmatter card
        // Strategy: extract frontmatter card, wrap sections on the rest, then re-prepend
        var frontmatterCard = contentEl.querySelector('.frontmatter-card');
        if (frontmatterCard) {
          frontmatterCard.remove();
        }
        wrapSections(contentEl);
        if (frontmatterCard) {
          contentEl.insertBefore(frontmatterCard, contentEl.firstChild);
        }

        // Build TOC sidebar
        buildTOC();

        contentEl.classList.add('visible');
        dropZoneContainer.classList.add('collapsed');

        if (name) {
          fileName.textContent = name;
          fileInfo.classList.add('visible');
        }
        hasFile = true;
      }

      // ---- File reading ----
      function readFile(file) {
        const reader = new FileReader();
        reader.onload = function (e) {
          renderMarkdown(e.target.result, file.name);
        };
        reader.readAsText(file);
      }

      // ---- Drop zone click ----
      dropZone.addEventListener('click', function () {
        fileInput.click();
      });

      dropZone.addEventListener('keydown', function (e) {
        if (e.key === 'Enter' || e.key === ' ') {
          e.preventDefault();
          fileInput.click();
        }
      });

      fileInput.addEventListener('change', function () {
        if (fileInput.files.length) {
          readFile(fileInput.files[0]);
        }
      });

      // ---- Change file ----
      changeFileBtn.addEventListener('click', function () {
        fileInput.value = '';
        fileInput.click();
      });

      // ---- Drag and drop on drop zone ----
      dropZone.addEventListener('dragover', function (e) {
        e.preventDefault();
        dropZone.classList.add('drag-over');
      });

      dropZone.addEventListener('dragleave', function () {
        dropZone.classList.remove('drag-over');
      });

      dropZone.addEventListener('drop', function (e) {
        e.preventDefault();
        dropZone.classList.remove('drag-over');
        if (e.dataTransfer.files.length) {
          readFile(e.dataTransfer.files[0]);
        }
      });

      // ---- Global drag and drop (when content is showing) ----
      let dragCounter = 0;

      document.addEventListener('dragenter', function (e) {
        e.preventDefault();
        dragCounter++;
        if (hasFile) {
          dragOverlay.classList.add('visible');
        }
      });

      document.addEventListener('dragleave', function (e) {
        e.preventDefault();
        dragCounter--;
        if (dragCounter === 0) {
          dragOverlay.classList.remove('visible');
        }
      });

      document.addEventListener('dragover', function (e) {
        e.preventDefault();
      });

      document.addEventListener('drop', function (e) {
        e.preventDefault();
        dragCounter = 0;
        dragOverlay.classList.remove('visible');
        if (e.dataTransfer.files.length) {
          readFile(e.dataTransfer.files[0]);
        }
      });

      // ---- Clipboard paste ----
      document.addEventListener('paste', function (e) {
        const text = e.clipboardData.getData('text/plain');
        if (text) {
          renderMarkdown(text, 'Pasted content');
        }
      });

      // ---- Theme toggle ----
      function setTheme(theme) {
        document.documentElement.setAttribute('data-theme', theme);
        themeToggle.textContent = theme === 'dark' ? '☀️' : '🌙';
        themeToggle.setAttribute('aria-label', theme === 'dark' ? 'Switch to light mode' : 'Switch to dark mode');
        hljsLight.disabled = theme === 'dark';
        hljsDark.disabled = theme === 'light';
        localStorage.setItem('md-viewer-theme', theme);
      }

      themeToggle.addEventListener('click', function () {
        const current = document.documentElement.getAttribute('data-theme');
        setTheme(current === 'dark' ? 'light' : 'dark');
      });

      // ---- Init theme ----
      const saved = localStorage.getItem('md-viewer-theme');
      if (saved) {
        setTheme(saved);
      } else if (window.matchMedia('(prefers-color-scheme: light)').matches) {
        setTheme('light');
      } else {
        setTheme('dark');
      }
    })();
  </script>
</body>
</html>
